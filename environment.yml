name: dataq
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  - pip:
    # ── Web framework ────────────────────────────────────────────────────────
    - fastapi==0.136.3
    - uvicorn[standard]==0.48.0
    - python-multipart==0.0.20   # required for FastAPI form data

    # ── Task queue ───────────────────────────────────────────────────────────
    - celery[redis]==5.6.3
    - redis==5.2.1

    # ── Database ─────────────────────────────────────────────────────────────
    - sqlalchemy==2.0.49
    - alembic==1.18.4
    - psycopg2-binary==2.9.10    # swap for psycopg2 in production Docker image

    # ── Config / validation ──────────────────────────────────────────────────
    - pydantic==2.11.5
    - pydantic-settings==2.14.1

    # ── DQ engine (PINNED — GX v1 API drifts across point releases) ──────────
    - great-expectations==1.17.2

    # ── Observability ────────────────────────────────────────────────────────
    - structlog==25.5.0
    - opencensus-ext-azure==1.1.14   # App Insights via OpenCensus bridge

    # ── Auth / secrets ───────────────────────────────────────────────────────
    - msal==1.32.3
    - azure-keyvault-secrets==4.9.0
    - azure-identity==1.23.0

    # ── Datasource connectors ────────────────────────────────────────────────
    - snowflake-sqlalchemy==1.7.4
    - snowflake-connector-python==3.15.0
    - azure-storage-blob==12.25.0    # ADLS Gen2
    - boto3==1.38.29                 # S3
    - databricks-sql-connector==3.7.0  # Unity Catalog

    # ── MCP (Week 7) ─────────────────────────────────────────────────────────
    - fastmcp==2.8.1

    # ── Code quality (also in pre-commit) ────────────────────────────────────
    - black==26.5.1
    - ruff==0.15.14
    - mypy==2.1.0
    - bandit[toml]==1.9.4

    # ── Type stubs ───────────────────────────────────────────────────────────
    - types-redis==4.6.0.20241004
    - sqlalchemy[mypy]==2.0.49

    # ── Testing ──────────────────────────────────────────────────────────────
    - pytest==9.0.3
    - pytest-asyncio==0.26.0
    - pytest-cov==6.1.0
    - httpx==0.28.1                  # async test client for FastAPI

    # ── Dev utilities ────────────────────────────────────────────────────────
    - pre-commit==4.2.0
