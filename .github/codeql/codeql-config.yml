name: "DataQ CodeQL config"

# Inherit the full security-and-quality suite, then trim known false positives.
queries:
  - uses: security-and-quality

paths-ignore:
  # Alembic migrations + env.py read module-level globals (revision, down_revision,
  # branch_labels, depends_on) via inspection and intentionally import models
  # for autogenerate side-effects. CodeQL flags both as "unused" — false positives
  # that block merge on every migration PR. See #43 for the recurring history.
  - backend/alembic/**

query-filters:
  # py/ineffectual-statement fires on the `...` body of Protocol method stubs:
  #     class SecretStore(Protocol):
  #         def get(self, name: str) -> str: ...   # CodeQL: "Statement has no effect"
  # That's the canonical Python idiom (PEP 544). Excluding the rule because
  # ruff's B018 (useless-expression) is already enabled in pyproject.toml's
  # ruff.lint.select; B018 correctly recognises the Ellipsis-stub idiom, so
  # genuine no-op statements (e.g. `1 + 1` as a top-level expression) are still
  # caught by ruff — we don't lose safety here.
  - exclude:
      id: py/ineffectual-statement
