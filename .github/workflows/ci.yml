name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install black==26.5.1 ruff==0.15.14

      - name: Black (format check)
        run: black --check backend/

      - name: Ruff (lint)
        run: ruff check backend/

  backend-types:
    name: Backend — type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install type-check deps
        # Runtime deps from the single source of truth; mypy itself pinned inline.
        run: |
          pip install mypy==2.1.0
          pip install -r backend/requirements-typecheck.txt

      - name: mypy
        run: mypy backend/app/

  backend-sast:
    name: Backend — SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Bandit
        run: pip install bandit[toml]==1.9.4

      - name: Bandit
        run: bandit -c pyproject.toml -r backend/app/

  backend-test:
    name: Backend — tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test deps
        # Tooling pins inline; runtime deps from the single source of truth.
        run: |
          pip install pytest==8.4.2 pytest-asyncio==1.3.0 \
            pytest-cov==6.1.0 httpx==0.28.1
          pip install -r backend/requirements-typecheck.txt

      - name: pytest
        run: pytest backend/tests/

  # ── Secret scanning ──────────────────────────────────────────────────────────
  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — lint & format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier (format check)
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

  frontend-test:
    name: Frontend — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vitest
        run: pnpm test

  # ── CodeQL SAST ──────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
