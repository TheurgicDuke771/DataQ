name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install black==26.5.1 ruff==0.15.14

      - name: Black (format check)
        run: black --check backend/

      - name: Ruff (lint)
        run: ruff check backend/

  backend-types:
    name: Backend — type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install type-check deps
        # Runtime deps from the single source of truth; mypy itself pinned inline.
        run: |
          pip install mypy==2.1.0
          pip install -r backend/requirements-typecheck.txt

      - name: mypy
        run: mypy backend/app/

  backend-sast:
    name: Backend — SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Bandit
        run: pip install bandit[toml]==1.9.4

      - name: Bandit
        run: bandit -c pyproject.toml -r backend/app/

  backend-test:
    name: Backend — tests
    runs-on: ubuntu-latest
    # Ephemeral Postgres for DB-backed integration tests (seed/run/endpoint).
    # Matches the compose image; gen_random_uuid() is built in to PG16.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dataq
          POSTGRES_PASSWORD: dataq
          POSTGRES_DB: dataq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dataq"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # Redis broker for the real-broker E2E (dispatch -> worker round-trip).
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test deps
        # Tooling pins inline; runtime deps from the single source of truth.
        run: |
          pip install pytest==8.4.2 pytest-asyncio==1.3.0 \
            pytest-cov==6.1.0 httpx==0.28.1
          pip install -r backend/requirements-typecheck.txt
          # Runtime deps the worker/datasource tests import at module load
          # (not in requirements-typecheck.txt — they're mypy-ignored, no stubs).
          # Pins must match environment.yml. GX pulls pandas transitively.
          pip install celery[redis]==5.6.3 great-expectations==1.17.2
          # Datasource-adapter SDKs the connection tests import at module load
          # (monkeypatched in the tests, but must be importable). S3 (boto3) and
          # Unity Catalog (databricks-sql-connector) add theirs with those PRs.
          pip install azure-storage-blob==12.25.0

      - name: pytest
        # TEST_DATABASE_URL enables the db_session fixture; DATABASE_URL + REDIS_URL
        # enable the real-broker E2E. All DB/broker tests skip when unset (e.g. a
        # contributor running pytest without the services).
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://dataq:dataq@localhost:5432/dataq_test
          DATABASE_URL: postgresql+psycopg2://dataq:dataq@localhost:5432/dataq_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest backend/tests/

  # ── Secret scanning ──────────────────────────────────────────────────────────
  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — lint & format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier (format check)
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

  frontend-test:
    name: Frontend — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vitest
        run: pnpm test

  # ── CodeQL SAST ──────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
