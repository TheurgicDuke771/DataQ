name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install lint tools
        run: pip install -r backend/requirements-tooling.txt

      - name: Black (format check)
        run: black --check backend/

      - name: Ruff (lint)
        run: ruff check backend/

      - name: Typecheck-deps in sync
        # Guard the pre-commit mypy hook against backend/requirements-typecheck.txt
        # (Dependabot bumps the requirements file but bypasses the local hook —
        # this catches the drift in CI, which previously slipped through).
        run: python scripts/check-typecheck-deps.py

  backend-types:
    name: Backend — type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install type-check deps
        # mypy from the tooling file; the typed subset it checks against.
        run: |
          pip install -r backend/requirements-tooling.txt
          pip install -r backend/requirements-typecheck.txt

      - name: mypy
        run: mypy backend/app/

  backend-sast:
    name: Backend — SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Bandit
        run: pip install -r backend/requirements-tooling.txt

      - name: Bandit
        run: bandit -c pyproject.toml -r backend/app/

  backend-audit:
    name: Backend — dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit==2.10.0

      - name: pip-audit (full runtime + test surface)
        # Synchronous CVE gate over the entire runtime + test dependency tree
        # (single source: requirements-dev.txt) + transitive deps, against the
        # PyPI/OSV advisory DB. Complements the Dependabot alerts (full graph,
        # async) with a fail-fast merge check.
        #
        # The 5 ignored advisories are cryptography + pyOpenSSL CVEs blocked by
        # snowflake-connector-python<4 / snowflake-sqlalchemy<4 — a deliberate
        # major datasource bump tracked in #129 (the deadline for removing these).
        #
        # Bounded retry: pip-audit resolves the requirements file via PyPI's
        # per-package JSON endpoint, so a single transient PyPI/OSV 5xx (e.g.
        # "503 Backend is unhealthy") aborts the whole audit and flakes the gate.
        # Retrying with backoff absorbs that *without* masking real findings — a
        # genuine CVE fails every attempt and still blocks (90s worst-case backoff).
        run: |
          audit() {
            pip-audit -r backend/requirements-dev.txt \
              --ignore-vuln PYSEC-2026-36 \
              --ignore-vuln PYSEC-2026-35 \
              --ignore-vuln CVE-2026-26007 \
              --ignore-vuln CVE-2026-27448 \
              --ignore-vuln CVE-2026-27459
          }
          for attempt in 1 2 3 4; do
            if audit; then
              exit 0
            fi
            if [ "$attempt" -lt 4 ]; then
              echo "::warning::pip-audit attempt $attempt failed (likely a transient PyPI/OSV 5xx) — retrying in $((attempt * 15))s"
              sleep $((attempt * 15))
            fi
          done
          echo "::error::pip-audit failed after 4 attempts — a real CVE or a persistent PyPI/OSV outage (see log above)"
          exit 1

  backend-test:
    name: Backend — tests
    runs-on: ubuntu-latest
    # Ephemeral Postgres for DB-backed integration tests (seed/run/endpoint).
    # Matches the compose image; gen_random_uuid() is built in to PG16.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dataq
          POSTGRES_PASSWORD: dataq
          POSTGRES_DB: dataq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dataq"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # Redis broker for the real-broker E2E (dispatch -> worker round-trip).
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install test deps
        # Single source of truth: runtime + typed subset + test toolchain, all
        # from backend/requirements-dev.txt. pip upgraded for PYSEC-2026-196.
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements-dev.txt

      - name: pytest
        # TEST_DATABASE_URL enables the db_session fixture; DATABASE_URL + REDIS_URL
        # enable the real-broker E2E. All DB/broker tests skip when unset (e.g. a
        # contributor running pytest without the services).
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://dataq:dataq@localhost:5432/dataq_test
          DATABASE_URL: postgresql+psycopg2://dataq:dataq@localhost:5432/dataq_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest backend/tests/

  # ── Secret scanning ──────────────────────────────────────────────────────────
  secrets:
    name: Secret scanning (betterleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Betterleaks has no official GitHub Action; run the official pinned
      # container image. Drop-in gitleaks replacement: nonzero exit on findings
      # fails the job. safe.directory env is required because the container runs
      # as root while checkout writes files as the runner user — without it git
      # aborts with "detected dubious ownership".
      - name: Run betterleaks
        run: |
          docker run --rm \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/repo \
            -v "$PWD:/repo" -w /repo \
            ghcr.io/betterleaks/betterleaks:v1.4.1 \
            git /repo --redact --verbose

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — lint & format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier (format check)
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

  frontend-test:
    name: Frontend — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vitest
        run: pnpm test

  frontend-e2e:
    name: Frontend — browser E2E (Playwright)
    runs-on: ubuntu-latest
    # Full-stack browser smoke (#128): real API + seeded demo data + dev-bypass,
    # driven through the React UI. Mirrors the compose stack — Postgres + Redis
    # services, the backend on :8000, Playwright starts its own Vite dev server.
    # No Azure / datasource creds: connectivity fails-soft, the UI paths are real.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dataq
          POSTGRES_PASSWORD: dataq
          POSTGRES_DB: dataq_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dataq"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://dataq:dataq@localhost:5432/dataq_e2e
      REDIS_URL: redis://localhost:6379/0
      # api + seed must share the secret store so secrets the seed writes are
      # readable by the api (compose parity). dev-bypass removes the auth wall.
      SECRET_STORE: redis
      AUTH_DEV_BYPASS: "true"
      ENVIRONMENT: dev
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install backend
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements-dev.txt

      - name: Run migrations + seed demo data
        # alembic.ini's script_location is relative to backend/ (compose parity).
        run: |
          (cd backend && alembic upgrade head)
          python -m backend.scripts.seed_dev

      - name: Launch the API
        # Background uvicorn, then block until it serves before Playwright starts.
        run: |
          uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/connections >/dev/null; then
              echo "api up"; exit 0
            fi
            sleep 2
          done
          echo "api did not come up"; exit 1

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright E2E
        working-directory: frontend
        # CI=true → Playwright starts its own Vite dev server (proxying to the
        # api on :8000) and applies forbidOnly + flaky-retries.
        env:
          VITE_API_PROXY_TARGET: http://localhost:8000
        run: pnpm e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  frontend-audit:
    name: Frontend — dependency audit (pnpm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high+)
        # Fails on high/critical advisories in the dependency tree; lower
        # severities are reported but don't block (avoid noise from unfixable
        # transitive dev-tool advisories). Pairs with Dependabot alerts (async).
        run: pnpm audit --audit-level=high

  # ── CodeQL SAST ──────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
