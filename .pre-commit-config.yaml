repos:
  # ── Linting + import sorting (runs first so Black formats the fixed code) ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]

  # ── Formatting (canonical formatter — runs last to own final layout) ───────
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        language_version: python3.11

  # ── Type checking ───────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        files: ^backend/app/
        additional_dependencies:
          - pydantic==2.11.5
          - pydantic-settings==2.14.1
          - sqlalchemy[mypy]==2.0.49
          - types-redis==4.6.0.20241004

  # ── Secret scanning ─────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  # ── General hygiene ─────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key         # belt-and-suspenders alongside gitleaks
      - id: no-commit-to-branch
        args: [--branch, main]         # prevents direct commits to main
